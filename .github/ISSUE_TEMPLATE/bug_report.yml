name: Bug report
description: Report a problem with Bottle Rating Generator
title: '[Bug]: '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Tap...\n3. See..."
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: iPhone Safari, WeChat browser, Android Chrome
